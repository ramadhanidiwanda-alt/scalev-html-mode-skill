name: Feature request
description: Request a template, validator, docs update, or workflow improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe desired behavior or artifact.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Landing template
        - Checkout template
        - Thank-you template
        - Runtime docs
        - Validation script
        - GitHub workflow
        - Other
    validations:
      required: true
