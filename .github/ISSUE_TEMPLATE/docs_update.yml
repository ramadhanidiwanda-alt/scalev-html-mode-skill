name: Docs update
description: Suggest clarification or correction for skill docs/references.
title: "docs: "
labels: ["docs"]
body:
  - type: input
    id: file
    attributes:
      label: File or section
      placeholder: references/checkout-patterns.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Current issue
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
    validations:
      required: true
